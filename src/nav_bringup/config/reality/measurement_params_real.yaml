robot_measurements:
  # base_link is defined at the ground-projected center of the vehicle:
  # z = 0 at ground plane, x/y = geometric center of the chassis footprint.

  vehicle_body:
    # Chassis footprint from user measurement, converted from mm to m.
    # Nav2 uses length/width for footprint; height is only for URDF visualization.
    size: [0.751, 0.500, 0.200]
    # Extra virtual padding around the physical chassis for Nav2/TEB collision checks.
    nav2_safety_margin: 0.05

  # Physical installation of the lidar relative to the robot base.
  # This is the single source of truth for:
  # 1. robot_state_publisher's base_link -> livox_frame TF
  # 2. ground_segmentation sensor_height
  #
  # Unless you are recalibrating FAST-LIO-SAM's LiDAR-IMU extrinsic, lidar installation
  # changes should be made here instead of editing FAST-SLAM-G config files.
  base_link_to_livox:
    # LiDAR position from user measurement, converted from mm to m.
    xyz: [0.250, 0.056, 0.405]
    rpy: [0.0, 0.0, 0.0]
